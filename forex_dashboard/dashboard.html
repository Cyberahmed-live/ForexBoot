<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log transakcji Forex</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      padding: 0rem;
    }
    table th, table td {
      vertical-align: middle;
    }
    table th {
      text-align: center;
    }
    .container_fit{
      max-width: fit-content;
    }
  </style>
</head>
<body>
  <div class="container container_fit">
    <h1 class="mb-4">Log transakcji Forex</h1>

    <div class="row g-3 align-items-end mb-3">
      <div class="col-md-3">
        <label for="directionFilter" class="form-label">Filtr kierunku</label>
        <select class="form-select" id="directionFilter" onchange="applyFilters()">
          <option value="">Wszystkie</option>
          <option value="BUY">Buy</option>
          <option value="SELL">Sell</option>
        </select>
      </div>
      <div class="col-md-3">
        <label for="symbolFilter" class="form-label">Filtr symbolu</label>
        <select class="form-select" id="symbolFilter" onchange="applyFilters()">
          <option value="">Wszystkie</option>
        </select>
      </div>
      <div class="col-md-3">
        <label for="startDate" class="form-label">Od daty</label>
        <input type="date" id="startDate" class="form-control" onchange="applyFilters()" />
      </div>
      <div class="col-md-3">
        <label for="endDate" class="form-label">Do daty</label>
        <input type="date" id="endDate" class="form-control" onchange="applyFilters()" />
      </div>
    </div>

    <div class="row g-3 align-items-center mb-3">
      <div class="col-auto">
        <label for="rowsPerPageSelect" class="form-label">Wierszy na stronę:</label>
      </div>
      <div class="col-auto">
        <select id="rowsPerPageSelect" class="form-select" onchange="changeRowsPerPage()">
          <option>5</option>
          <option selected>10</option>
          <option>20</option>
          <option>50</option>
          <option>100</option>
          <option value="all">Wszystkie</option>
        </select>
      </div>
      <div class="col-auto">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="autoRefresh" checked>
          <label class="form-check-label" for="autoRefresh">Auto odświeżanie</label>
        </div>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover" id="logTable">
        <thead class="table-light">
          <tr>
            <th>Data</th>
            <th>Instrument</th>
            <th>Kierunek</th>
            <th>Cena</th>
            <th>SL</th>
            <th>TP</th>
            <th>Dźwignia</th>
            <th>Prognoza</th>
            <th>Status</th>
            <th>ID zlecenia</th>
            <th>Pewność</th>
            <th>ATR</th>
            <th>Z/S</th>
            <th>Profit</th>
            <th>Done</th>
            <th>Close date</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <nav>
      <ul class="pagination justify-content-center">
        <li class="page-item"><button class="page-link" onclick="firstPage()">« Pierwsza</button></li>
        <li class="page-item"><button class="page-link" onclick="prevPage()">‹ Poprzednia</button></li>
        <li class="page-item disabled"><span class="page-link" id="pageInfo"></span></li>
        <li class="page-item"><button class="page-link" onclick="nextPage()">Następna ›</button></li>
        <li class="page-item"><button class="page-link" onclick="lastPage()">Ostatnia »</button></li>
      </ul>
    </nav>
  </div>

  <script>
    let allRows = [];
    let filteredRows = [];
    let currentPage = 1;
    let rowsPerPage = 10;

    function loadCSVData() {
      fetch("../forex_logs/trades_log.csv")
        .then(res => res.text())
        .then(text => {
          const rows = text.trim().split("\n").map(r => r.split(","));
          const headers = rows.shift();
          // Indeksy kolumn
          const doneIdx = headers.findIndex(h => h.trim().toLowerCase() === 'done');
          const exitTimeIdx = headers.findIndex(h => h.trim().toLowerCase().includes('close date') || h.trim().toLowerCase() === 'exit_time');
          // Sortowanie: trwające (done=Nie, exit_time=None) na górze, zakończone po dacie malejąco
          rows.sort((a, b) => {
          const aOpen = a[doneIdx].trim().toLowerCase() === 'nie' && (!a[exitTimeIdx] || a[exitTimeIdx].trim() === '' || a[exitTimeIdx].trim().toLowerCase() === 'none');
          const bOpen = b[doneIdx].trim().toLowerCase() === 'nie' && (!b[exitTimeIdx] || b[exitTimeIdx].trim() === '' || b[exitTimeIdx].trim().toLowerCase() === 'none');
          if (aOpen && !bOpen) return -1;
          if (!aOpen && bOpen) return 1;
          // Obie zakończone: sortuj po dacie malejąco
          const aDate = a[exitTimeIdx] ? a[exitTimeIdx].trim() : '';
          const bDate = b[exitTimeIdx] ? b[exitTimeIdx].trim() : '';
          if (aDate === bDate) return 0;
          return aDate < bDate ? 1 : -1;
          });
          allRows = rows;
          populateSymbolFilter();
          applyFilters();
          });
    }

    function populateSymbolFilter() {
      const select = document.getElementById("symbolFilter");
      const symbols = new Set(allRows.map(row => row[1]));
      select.innerHTML = '<option value="">Wszystkie</option>';
      symbols.forEach(sym => {
        const opt = document.createElement("option");
        opt.value = sym;
        opt.textContent = sym;
        select.appendChild(opt);
      });
    }

    function applyFilters() {
      const dir = document.getElementById("directionFilter").value;
      const sym = document.getElementById("symbolFilter").value;
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;
      filteredRows = allRows.filter(row => {
        const date = row[0].split(" ")[0];
        return (!dir || row[2].toUpperCase() === dir) &&
               (!sym || row[1] === sym) &&
               (!startDate || date >= startDate) &&
               (!endDate || date <= endDate);
      });
      currentPage = 1;
      renderTable();
    }

    function renderTable() {
      const tbody = document.querySelector("#logTable tbody");
      tbody.innerHTML = "";
      tbody.classList.add("table-hover");
      const total = filteredRows.length;
      const rpp = rowsPerPage === "all" ? total : parseInt(rowsPerPage);
      const start = (currentPage - 1) * rpp;
      const end = start + rpp;
      const pageRows = filteredRows.slice(start, end);

      pageRows.forEach(row => {
        const tr = document.createElement("tr");
        const icon = document.createElement("i");

        if (row[2] === "BUY") icon.className = "bi bi-arrow-up-circle-fill text-success me-1";
        else if (row[2] === "SELL") icon.className = "bi bi-arrow-down-circle-fill text-danger me-1";
        else icon.className = "bi bi-circle text-muted me-1";
        
        const zs = row[12].trim();
        if (zs === "S") tr.classList.add("table-danger");
        if (zs === "Z") tr.classList.add("table-success");

        const dateCell = document.createElement("td");
        dateCell.appendChild(icon);
        dateCell.appendChild(document.createTextNode(row[0]));
        tr.appendChild(dateCell);

        for (let i = 1; i < row.length; i++) {
          const td = document.createElement("td");
          td.textContent = row[i];
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      });

      const totalPages = Math.ceil(total / rpp);
      document.getElementById("pageInfo").textContent = `Strona ${currentPage} z ${totalPages}`;
    }

    function changeRowsPerPage() {
      const val = document.getElementById("rowsPerPageSelect").value;
      rowsPerPage = val === "all" ? "all" : parseInt(val);
      currentPage = 1;
      renderTable();
    }

    function nextPage() {
      const total = filteredRows.length;
      const max = rowsPerPage === "all" ? 1 : Math.ceil(total / rowsPerPage);
      if (currentPage < max) {
        currentPage++;
        renderTable();
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderTable();
      }
    }

    function firstPage() {
      currentPage = 1;
      renderTable();
    }

    function lastPage() {
      const total = filteredRows.length;
      currentPage = rowsPerPage === "all" ? 1 : Math.ceil(total / rowsPerPage);
      renderTable();
    }

    setInterval(() => {
      if (document.getElementById("autoRefresh").checked) {
        loadCSVData();
      }
    }, 5000);

    loadCSVData();
  </script>
</body>
</html>
